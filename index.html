<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>COMPOUND</title>

  <!-- PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="COMPOUND" />
  <meta name="theme-color" content="#070709" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #050507; color: #F2F1EC; font-family: 'Outfit', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }

    /* hide scrollbar on inner content while keeping scroll */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

    /* avoid blue tap highlight on Android */
    button { -webkit-tap-highlight-color: transparent; }

    /* number input cleanup */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    /* show side meta only on wider viewports */
    @media (min-width: 980px) {
      .side-meta { display: block !important; }
    }

    /* placeholder color */
    input::placeholder { color: rgba(242,241,236,.28); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Static PWA manifest + icons (real files, so Chrome offers a true "Install app"
       and mints a standalone WebAPK — a runtime blob: manifest is NOT installable). -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-180.png" />

  <!-- App icon data (sets window.COMPOUND_ICON_180 / _512) — still used by the in-app shell. -->
  <script src="/app-icon.js"></script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
