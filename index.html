<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>COMPOUND</title>

  <!-- PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="COMPOUND" />
  <meta name="theme-color" content="#070709" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #050507; color: #F2F1EC; font-family: 'Outfit', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }

    /* hide scrollbar on inner content while keeping scroll */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

    /* avoid blue tap highlight on Android */
    button { -webkit-tap-highlight-color: transparent; }

    /* number input cleanup */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    /* show side meta only on wider viewports */
    @media (min-width: 980px) {
      .side-meta { display: block !important; }
    }

    /* placeholder color */
    input::placeholder { color: rgba(242,241,236,.28); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- App icon data (sets window.COMPOUND_ICON_180 / _512) — must run before the manifest below -->
  <script src="/app-icon.js"></script>
  <script>
    // Set up Add-to-Home-Screen icon + manifest at runtime (self-contained)
    (function () {
      try {
        if (window.COMPOUND_ICON_180) {
          var apple = document.createElement('link');
          apple.rel = 'apple-touch-icon';
          apple.href = window.COMPOUND_ICON_180;
          document.head.appendChild(apple);
          var fav = document.createElement('link');
          fav.rel = 'icon';
          fav.href = window.COMPOUND_ICON_180;
          document.head.appendChild(fav);
        }
        var manifest = {
          name: 'COMPOUND',
          short_name: 'COMPOUND',
          description: 'Consistency over perfection. Life tracking & training.',
          display: 'standalone',
          orientation: 'portrait',
          background_color: '#070709',
          theme_color: '#070709',
          start_url: '.',
          icons: [
            { src: window.COMPOUND_ICON_512, sizes: '512x512', type: 'image/png', purpose: 'any' },
            { src: window.COMPOUND_ICON_512, sizes: '512x512', type: 'image/png', purpose: 'maskable' },
            { src: window.COMPOUND_ICON_180, sizes: '180x180', type: 'image/png' }
          ]
        };
        var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
      } catch (e) {}
    })();
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
